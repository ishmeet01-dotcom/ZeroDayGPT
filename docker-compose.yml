version: '3.9'

services:
  backend:
    build: ./backend
    container_name: zerodaygpt-backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    environment:
      - TESSERACT_CMD=/usr/bin/tesseract
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "curl", "-f", "http://localhost:8000/health" ]
      interval: 30s
      timeout: 10s
      retries: 3

  frontend:
    build: ./frontend
    container_name: zerodaygpt-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

networks:
  default:
    name: zerodaygpt-network
